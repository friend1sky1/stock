<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>做T计算器</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --profit:      #E60012;
  --profit-bg:   #FEF0F0;
  --loss:        #2D8A4E;
  --loss-bg:     #EEF7F0;
  --gold:        #D4A843;
  --gold-light:  #FAF4E5;
  --bg:          #FBF6F0;
  --card:        #FFFFFF;
  --text:        #3D2E2E;
  --text-secondary: #8B7870;
  --text-muted:  #B8A8A0;
  --border:      #E8DCD0;
  --shadow-sm:   0 1px 3px rgba(0,0,0,0.04);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.05);
  --shadow-focus: 0 0 0 3px rgba(230,0,18,0.08);
  --radius:      12px;
  --transition:  0.15s ease;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%; overflow: hidden;
  font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', 'Menlo', monospace;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
.app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  max-width: 440px; margin: 0 auto;
  padding: 4px 10px 8px;
}
/* Header — compact */
.header {
  flex-shrink: 0; text-align: center; padding: 2px 0 4px;
  margin-bottom: 4px;
}
.header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.05rem; font-weight: 700; color: var(--profit);
  letter-spacing: 3px;
}

/* Mode Toggle */
.mode-toggle {
  flex-shrink: 0; display: flex; gap: 6px; margin-bottom: 6px;
}
.mode-btn {
  flex: 1; padding: 6px 0; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--card); font-size: 0.8rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
  color: var(--text-secondary); font-family: inherit;
}
.mode-btn.active {
  border-color: var(--profit); background: var(--profit-bg); color: var(--profit);
}

/* Scrollable Input Area */
.scroll-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.input-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow-card); padding: 10px 14px; margin-bottom: 8px;
}
.input-card h2 {
  font-size: 0.82rem; font-weight: 700; color: var(--profit);
  margin-bottom: 8px; padding-bottom: 5px;
  border-bottom: 1px dashed var(--border);
  font-family: 'Noto Serif SC', serif;
  display: flex; align-items: center; gap: 6px;
  letter-spacing: 2px;
  cursor: pointer; user-select: none;
}
.input-card h2 .icon { font-size: 0.9rem; }
.input-card h2 .arrow { font-size: 0.7rem; margin-left: auto; color: var(--text-muted); transition: transform 0.2s; }
.input-card h2 .arrow.open { transform: rotate(90deg); }

.input-card .fold-body { display: block; }
.input-card .fold-body.hidden { display: none; }

.input-row {
  display: flex; align-items: center; margin-bottom: 6px; gap: 6px;
}
.input-row:last-child { margin-bottom: 0; }
.input-row label {
  font-size: 0.78rem; color: var(--text-secondary); white-space: nowrap;
  min-width: 80px; flex-shrink: 0; font-family: 'Noto Serif SC', serif;
}
.input-row input {
  flex: 1; min-width: 0;
  padding: 7px 8px; font-size: 0.9rem; font-weight: 500;
  border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text);
  text-align: right; transition: all var(--transition);
  -webkit-appearance: none; font-family: inherit;
}
.input-row input:focus {
  outline: none; border-color: var(--profit); background: #FFF;
  box-shadow: var(--shadow-focus);
}
.input-row .unit {
  font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0; min-width: 18px;
}

/* Spin buttons */
.spin-btn {
  width: 28px; height: 34px; flex-shrink: 0;
  border: 1.5px solid var(--border); border-radius: 6px;
  background: var(--card); color: var(--text-secondary);
  font-size: 0.65rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); user-select: none;
  -webkit-user-select: none;
}
.spin-btn:active { background: var(--profit-bg); color: var(--profit); border-color: var(--profit); }
.spin-btns { display: flex; gap: 2px; flex-shrink: 0; }

/* Ref tag */
.ref-tag {
  font-size: 0.6rem; color: var(--gold); white-space: nowrap;
  flex-shrink: 0; background: var(--gold-light); padding: 2px 6px; border-radius: 4px;
  cursor: pointer; border: 1px solid var(--gold); transition: all var(--transition); user-select: none;
}
.ref-tag:active, .ref-tag.active { background: var(--gold); color: #FFF; }

/* Fee card */
.fee-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow-card); padding: 10px 14px; margin-bottom: 8px;
}
.fee-card h3 {
  font-size: 0.82rem; font-weight: 700; color: var(--text-secondary);
  margin-bottom: 6px; letter-spacing: 2px;
  font-family: 'Noto Serif SC', serif;
}
.fee-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
}
.fee-row:last-child { margin-bottom: 0; }
.fee-row label {
  font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; min-width: 54px;
  font-family: 'Noto Serif SC', serif;
}
.fee-row input {
  width: 60px; padding: 5px 6px; font-size: 0.78rem;
  border: 1.5px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text); text-align: right;
  font-family: inherit;
}
.fee-row input:focus {
  outline: none; border-color: var(--gold);
}
.fee-row .unit-pct {
  font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0;
}
.fee-row .desc {
  font-size: 0.65rem; color: var(--text-muted); margin-left: 2px;
}
.fee-info {
  font-size: 0.65rem; color: var(--text-muted);
  margin-top: 4px; padding-top: 4px;
  border-top: 1px dotted var(--border);
  display: flex; flex-wrap: wrap; gap: 6px;
}
.fee-info span { white-space: nowrap; }

/* Calculate Button */
.calc-btn {
  width: 100%; padding: 11px;
  border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--profit), #B8000E);
  color: #FFF; font-size: 0.95rem; font-weight: 700;
  cursor: pointer; letter-spacing: 3px;
  margin-bottom: 8px; transition: all var(--transition);
  font-family: 'Noto Serif SC', serif;
}
.calc-btn:active { transform: scale(0.98); opacity: 0.9; }

/* Result Card */
.result-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow-card); padding: 14px;
  margin-bottom: 8px; display: none;
}
.result-card.show { display: block; border: 1.5px solid var(--gold); }
.result-card h2 {
  font-size: 0.82rem; font-weight: 700; color: var(--profit);
  margin-bottom: 8px; font-family: 'Noto Serif SC', serif;
  display: flex; align-items: center; gap: 6px;
}
.result-card h2 .icon { font-size: 0.9rem; }

.result-big {
  text-align: center; padding: 8px 0 10px;
  border-bottom: 1px dashed var(--border); margin-bottom: 8px;
  position: relative;
}
.result-big .label { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 1px; }
.result-big .value {
  font-size: 2rem; font-weight: 800; line-height: 1.15;
}
.result-big .value.profit { color: var(--profit); }
.result-big .value.loss { color: var(--loss); }
.result-big .pct {
  font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-top: 2px;
}

/* Copy button */
.copy-btn {
  position: absolute; top: 0; right: 0;
  font-size: 0.6rem; padding: 3px 8px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--card); color: var(--text-muted);
  cursor: pointer; transition: all var(--transition);
  font-family: inherit;
}
.copy-btn:active { background: var(--gold-light); color: var(--gold); }
.copy-btn.copied { color: var(--loss); border-color: var(--loss); }

/* Highlight row for key input (e.g. 卖出价 in reverse-T) */
.input-row.key-row {
  background: var(--profit-bg);
  border-radius: 8px;
  padding: 4px 6px;
  margin: 0 -6px 6px;
}
.input-row.key-row input {
  border-color: var(--profit);
  background: #FFF;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--profit);
}
.input-row.key-row label {
  font-weight: 700;
  color: var(--profit);
}

.result-detail {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px;
}
.result-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 3px 0; font-size: 0.76rem;
}
.result-item .key { color: var(--text-secondary); }
.result-item .val { font-weight: 600; color: var(--text); }
.result-item.full { grid-column: 1 / -1; }

.new-cost {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px dashed var(--border);
  text-align: center;
}
.new-cost .label { font-size: 0.65rem; color: var(--text-muted); }
.new-cost .value {
  font-size: 1.2rem; font-weight: 800; color: var(--profit);
  font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
}

/* Footer */
.footer {
  flex-shrink: 0; text-align: center; padding: 2px 0 0;
  font-size: 0.55rem; color: var(--text-muted);
}

@media (min-width: 440px) {
  .app {
    margin-top: 12px;
    margin-bottom: 12px;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>做T计算器</h1>
  </div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('reverse')">倒T · 高抛低吸</button>
    <button class="mode-btn" onclick="setMode('normal')">正T · 先买后卖</button>
  </div>

  <div class="scroll-area" id="scrollArea">
    <!-- Position Card — folded by default -->
    <div class="input-card" id="posCard">
      <h2 onclick="toggleFold('posCard')">
        <span class="icon">📊</span>持 仓 信 息
        <span class="arrow open" id="posArrow">▶</span>
      </h2>
      <div class="fold-body" id="posFold">
        <div class="input-row">
          <label>成本价</label>
          <input type="number" id="costPrice" placeholder="买入均价" step="0.001">
          <span class="unit">元</span>
        </div>
        <div class="input-row">
          <label>持仓数量</label>
          <input type="number" id="holdQty" placeholder="1000" step="1" value="1000">
          <span class="unit">股</span>
        </div>
      </div>
    </div>

    <!-- T Operation Card -->
    <div class="input-card" id="opCard">
      <h2><span class="icon">🔄</span><span id="opTitle">倒 T 操 作</span></h2>
      <div class="input-row">
        <label>开盘价</label>
        <input type="number" id="openPrice" placeholder="" step="0.001" onchange="onOpenPriceChange()">
        <span class="unit">元</span>
      </div>
      <div class="input-row key-row" id="tPrice1Row">
        <label id="tPrice1Label">卖出价</label>
        <input type="number" id="tPrice1" placeholder="先卖价格" step="0.001" oninput="onSellPriceInput()">
        <span class="unit">元</span>
        <span class="spin-btns">
          <span class="spin-btn" ontouchstart="spinStart('tPrice1',-0.01)" onmousedown="spinStart('tPrice1',-0.01)" ontouchend="spinStop()" onmouseup="spinStop()" onmouseleave="spinStop()">−</span>
          <span class="spin-btn" ontouchstart="spinStart('tPrice1',0.01)" onmousedown="spinStart('tPrice1',0.01)" ontouchend="spinStop()" onmouseup="spinStop()" onmouseleave="spinStop()">+</span>
        </span>
      </div>
      <div class="input-row">
        <label>操作数量</label>
        <input type="number" id="tQty" placeholder="1000" step="1" value="1000">
        <span class="unit">股</span>
      </div>
      <div class="input-row">
        <label id="expectLabel">预期接回价</label>
        <input type="number" id="tPrice2" placeholder="接回价=卖出价×99%" step="0.001" oninput="onBuybackInput()">
        <span class="unit">元</span>
        <span class="ref-tag" id="refTag99" onclick="applyRatio(0.99)">0.99</span>
        <span class="ref-tag" id="refTag995" onclick="applyRatio(0.995)">0.995</span>
        <span class="spin-btns">
          <span class="spin-btn" ontouchstart="spinStart('tPrice2',-0.01)" onmousedown="spinStart('tPrice2',-0.01)" ontouchend="spinStop()" onmouseup="spinStop()" onmouseleave="spinStop()">−</span>
          <span class="spin-btn" ontouchstart="spinStart('tPrice2',0.01)" onmousedown="spinStart('tPrice2',0.01)" ontouchend="spinStop()" onmouseup="spinStop()" onmouseleave="spinStop()">+</span>
        </span>
      </div>
    </div>

    <!-- Fee Card -->
    <div class="fee-card">
      <h3>💰 费 率 设 置</h3>
      <div class="fee-row">
        <label>佣金</label>
        <span class="desc" style="font-weight:600;color:var(--text)">0.016%</span>
        <span class="desc">（万1.6，最低5元）</span>
      </div>
      <div class="fee-info">
        <span>印花税 0.05%（卖出单向）</span>
        <span>过户费 0.001%（双向）</span>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()" id="calcBtn">💰 计算预估盈亏</button>

    <!-- Result Card -->
    <div class="result-card" id="resultCard">
      <h2><span class="icon">📋</span>预估结果</h2>
      <div class="result-big">
        <button class="copy-btn" onclick="copyResult()" id="copyBtn">复制</button>
        <div class="label">净盈亏</div>
        <div class="value" id="resultBig"></div>
        <div class="pct" id="resultPct"></div>
      </div>
      <div class="result-detail">
        <div class="result-item">
          <span class="key" id="op1Label">卖出收入</span><span class="val" id="op1Val">--</span>
        </div>
        <div class="result-item">
          <span class="key" id="op2Label">买入支出</span><span class="val" id="op2Val">--</span>
        </div>
        <div class="result-item">
          <span class="key">差价</span><span class="val" id="diffVal">--</span>
        </div>
        <div class="result-item">
          <span class="key">手续费合计</span><span class="val" id="feeTotal">--</span>
        </div>
        <div class="result-item full">
          <span class="key">佣金明细</span><span class="val" id="commDetail">--</span>
        </div>
        <div class="result-item full">
          <span class="key">印花税+过户费</span><span class="val" id="taxDetail">--</span>
        </div>
      </div>
      <div class="new-cost">
        <div class="label">操作后新持仓成本</div>
        <div class="value" id="newCost">--</div>
      </div>
    </div>
  </div>


</div>

<script>
let currentMode = 'reverse';
let spinTimer = null;
let spinId = null;
let spinDelta = 0;

// ---- Fold toggle ----
function toggleFold(cardId) {
  const foldEl = document.getElementById(cardId === 'posCard' ? 'posFold' : cardId + 'Fold');
  const arrowEl = document.getElementById(cardId === 'posCard' ? 'posArrow' : cardId + 'Arrow');
  const isHidden = foldEl.classList.contains('hidden');
  if (isHidden) {
    foldEl.classList.remove('hidden');
    if (arrowEl) arrowEl.classList.add('open');
  } else {
    foldEl.classList.add('hidden');
    if (arrowEl) arrowEl.classList.remove('open');
  }
}

// ---- Spin button ----
function spinStart(id, delta) {
  spinStop();
  spinId = id;
  spinDelta = delta;
  applySpin();
  spinTimer = setInterval(applySpin, 120);
}

function spinStop() {
  if (spinTimer) { clearInterval(spinTimer); spinTimer = null; }
  spinId = null;
  spinDelta = 0;
}

function applySpin() {
  if (!spinId) return;
  const el = document.getElementById(spinId);
  let val = parseFloat(el.value) || 0;
  val = Math.round((val + spinDelta) * 100) / 100;
  if (val < 0) val = 0;
  if (val > 99999) val = 99999;
  el.value = val.toFixed(2);
  if (spinId === 'tPrice1') updateRefPrice();
  if (spinId === 'tPrice2') document.getElementById('tPrice2').dataset.autoSet = 'false';
}

// ---- Open price -> sync sell price ----
function onOpenPriceChange() {
  const openP = parseFloat(document.getElementById('openPrice').value);
  if (!isNaN(openP) && openP > 0) {
    document.getElementById('tPrice1').value = openP.toFixed(2);
    updateRefPrice();
  }
}

// ---- Ref price: 倒T默认99%, 正T=101% ----
function applyRatio(ratio) {
  const t1 = parseFloat(document.getElementById('tPrice1').value);
  if (!isNaN(t1) && t1 > 0) {
    const t2 = document.getElementById('tPrice2');
    t2.value = (t1 * ratio).toFixed(2);
    t2.dataset.autoSet = 'false';
    document.getElementById('refTag99').classList.toggle('active', ratio === 0.99);
    document.getElementById('refTag995').classList.toggle('active', ratio === 0.995);
  }
}

function updateRefPrice() {
  const t1 = parseFloat(document.getElementById('tPrice1').value);
  if (!isNaN(t1) && t1 > 0) {
    const t2 = document.getElementById('tPrice2');
    if (!t2.value || t2.dataset.autoSet === 'true') {
      const ratio = currentMode === 'reverse' ? 0.99 : 1.01;
      t2.value = (t1 * ratio).toFixed(2);
      t2.dataset.autoSet = 'true';
    }
  }
}

function onSellPriceInput() {
  updateRefPrice();
}

function onBuybackInput() {
  document.getElementById('tPrice2').dataset.autoSet = 'false';
}

// ---- Mode switch ----
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  if (mode === 'reverse') {
    document.querySelectorAll('.mode-btn')[0].classList.add('active');
    document.getElementById('opTitle').textContent = '倒 T 操 作';
    document.getElementById('expectLabel').textContent = '预期接回价';
    document.getElementById('tPrice1Row').classList.add('key-row');
    document.getElementById('tPrice1Label').textContent = '卖出价';
    document.getElementById('tPrice1').placeholder = '先卖价格';
    document.getElementById('tPrice2').placeholder = '接回价=卖出价×99%';
    document.getElementById('op1Label').textContent = '卖出收入';
    document.getElementById('op2Label').textContent = '买入支出';
    document.getElementById('refTag99').style.display = '';
    document.getElementById('refTag995').style.display = '';
  } else {
    document.querySelectorAll('.mode-btn')[1].classList.add('active');
    document.getElementById('opTitle').textContent = '正 T 操 作';
    document.getElementById('expectLabel').textContent = '预期卖出价';
    document.getElementById('tPrice1Label').textContent = '买入价';
    document.getElementById('tPrice1').placeholder = '先买价格';
    document.getElementById('tPrice2').placeholder = '卖出价=买入价×1.01';
    document.getElementById('op1Label').textContent = '买入支出';
    document.getElementById('op2Label').textContent = '卖出收入';
    document.getElementById('refTag99').style.display = 'none';
    document.getElementById('refTag995').style.display = 'none';
  }
  updateRefPrice();
  document.getElementById('resultCard').classList.remove('show');
}

// ---- Calculation ----
function parseNum(id) {
  const v = parseFloat(document.getElementById(id).value);
  return isNaN(v) ? 0 : v;
}

function calcFee(amount, isSell) {
  let commRate = 0.016 / 100; // fixed at 0.016% (万1.6)
  let comm = amount * commRate;
  let minComm = 5; // fixed at 5 yuan, minimum commission
  if (comm > 0 && comm < minComm) comm = minComm;

  // Stamp tax (sell only) — fixed 0.05%
  let stampRate = 0.05 / 100;
  let stamp = isSell ? amount * stampRate : 0;

  // Transfer fee (both sides) — fixed 0.001%
  let transRate = 0.001 / 100;
  let trans = amount * transRate;

  return { comm, stamp, trans, total: comm + stamp + trans };
}

function fmtMoney(v) {
  if (Math.abs(v) < 0.005) return '0.00';
  return v.toFixed(2);
}

function fmtMoney4(v) {
  if (Math.abs(v) < 0.00005) return '0.0000';
  return v.toFixed(4);
}

function calculate() {
  const costPrice = parseNum('costPrice');
  const holdQty = parseNum('holdQty');
  const tPrice1 = parseNum('tPrice1');
  const tQty = parseNum('tQty');
  const tPrice2 = parseNum('tPrice2');

  if (!tPrice1 || !tQty || !tPrice2) {
    alert('请填写卖出价、操作数量和预期接回价');
    return;
  }

  let amount1, amount2, fee1, fee2, netOp1, netOp2, diff;

  if (currentMode === 'reverse') {
    // 倒T: 先卖后买
    amount1 = tPrice1 * tQty;
    fee1 = calcFee(amount1, true);
    amount2 = tPrice2 * tQty;
    fee2 = calcFee(amount2, false);
    netOp1 = amount1 - fee1.total;  // money received from sell
    netOp2 = amount2 + fee2.total;  // money spent on buy
    diff = netOp1 - netOp2;
    document.getElementById('op1Val').textContent = '+' + fmtMoney(netOp1);
    document.getElementById('op2Val').textContent = '-' + fmtMoney(netOp2);
  } else {
    // 正T: 先买后卖
    amount1 = tPrice1 * tQty;
    fee1 = calcFee(amount1, false);
    amount2 = tPrice2 * tQty;
    fee2 = calcFee(amount2, true);
    netOp1 = amount1 + fee1.total;  // money spent on buy
    netOp2 = amount2 - fee2.total;  // money received from sell
    diff = netOp2 - netOp1;
    document.getElementById('op1Val').textContent = '-' + fmtMoney(netOp1);
    document.getElementById('op2Val').textContent = '+' + fmtMoney(netOp2);
  }

  document.getElementById('diffVal').textContent = fmtMoney(diff);

  const feeTotal = fee1.total + fee2.total;
  document.getElementById('feeTotal').textContent = fmtMoney(feeTotal);

  const commTotal = fee1.comm + fee2.comm;
  document.getElementById('commDetail').textContent =
    '佣金 ' + fmtMoney(commTotal) + '（买' + fmtMoney(fee1.comm) + ' + 卖' + fmtMoney(fee2.comm) + '）';
  document.getElementById('taxDetail').textContent =
    '印花税 ' + fmtMoney(fee1.stamp + fee2.stamp) + ' + 过户费 ' + fmtMoney(fee1.trans + fee2.trans);

  // Big result — profit=red, loss=green (A股 convention)
  const bigEl = document.getElementById('resultBig');
  if (diff >= 0) {
    bigEl.textContent = '+' + fmtMoney(diff) + ' 元';
    bigEl.className = 'value profit';
  } else {
    bigEl.textContent = fmtMoney(diff) + ' 元';
    bigEl.className = 'value loss';
  }

  // Profit percentage
  const investCapital = (amount1 + fee1.total); // actual money out
  const pctEl = document.getElementById('resultPct');
  if (investCapital > 0) {
    const pct = (diff / investCapital * 100);
    const sign = pct >= 0 ? '+' : '';
    pctEl.textContent = sign + pct.toFixed(2) + '%';
    if (diff >= 0) {
      pctEl.style.color = 'var(--profit)';
    } else {
      pctEl.style.color = 'var(--loss)';
    }
  } else {
    pctEl.textContent = '--';
  }

  // New cost basis — only if position info provided
  if (costPrice && holdQty) {
    const totalCostBefore = costPrice * holdQty;
    const totalCostAfter = totalCostBefore - diff;
    const newCostPrice = totalCostAfter / holdQty;
    document.getElementById('newCost').textContent = fmtMoney4(newCostPrice) + ' 元';
    document.getElementById('newCost').style.display = '';
    document.querySelector('.new-cost .label').style.display = '';
  } else {
    document.getElementById('newCost').textContent = '';
    document.getElementById('newCost').style.display = 'none';
    document.querySelector('.new-cost .label').style.display = 'none';
  }

  // Show result
  const resultCard = document.getElementById('resultCard');
  resultCard.classList.add('show');
  document.getElementById('copyBtn').classList.remove('copied');
  document.getElementById('copyBtn').textContent = '复制';
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ---- Copy result ----
function copyResult() {
  const lines = [];
  lines.push('=== 做T预估结果 ===');
  lines.push('模式：' + (currentMode === 'reverse' ? '倒T（高抛低吸）' : '正T（先买后卖）'));
  lines.push(document.getElementById('op1Label').textContent + '：' + document.getElementById('op1Val').textContent);
  lines.push(document.getElementById('op2Label').textContent + '：' + document.getElementById('op2Val').textContent);
  lines.push('差价：' + document.getElementById('diffVal').textContent + ' 元');
  lines.push('手续费合计：' + document.getElementById('feeTotal').textContent + ' 元');
  lines.push('净盈亏：' + document.getElementById('resultBig').textContent);
  lines.push('盈亏率：' + document.getElementById('resultPct').textContent);
  lines.push('新持仓成本：' + document.getElementById('newCost').textContent);

  const text = lines.join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '已复制 ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
    });
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  }
}

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return; // don't interfere with typing
  if (e.key === 'Enter') {
    e.preventDefault();
    calculate();
  }
  if (e.key === 'b' || e.key === 'B') { setMode('normal'); }
  if (e.key === 's' || e.key === 'S') { setMode('reverse'); }
});
</script>
